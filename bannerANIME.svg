<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Profile Anime Banner</title>
  <desc id="desc">Animated GitHub profile banner inspired by anime characters.</desc>

  <!--
    COMO USAR:
    1. Salve como banner.svg
    2. Coloque no seu repositório de perfil do GitHub
    3. No README.md use:
       <img src="./banner.svg" width="100%" />

    TROQUE O PERSONAGEM ALTERANDO A CLASSE DO <svg>:
    class="kakyoin"   -> Noriaki Kakyoin vibes: verde, vermelho, hieróglifos/stand
    class="muichiro"  -> Muichiro vibes: névoa, azul/verde suave
    class="denji"     -> Denji vibes: laranja, serras, energia caótica
    class="maki"      -> Maki vibes: verde escuro, arma, foco
    class="ulquiorra" -> Ulquiorra vibes: preto, branco, verde espiritual
  -->

  <style>
    svg {
      --bg1: #07140f;
      --bg2: #0f3528;
      --main: #4dff9b;
      --accent: #ff3f64;
      --soft: #b9ffd7;
      --text: #f7fff9;
      --muted: #a9c9ba;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    svg.kakyoin {
      --bg1: #07140f;
      --bg2: #164b35;
      --main: #42ff8a;
      --accent: #e73557;
      --soft: #b8ffd2;
      --muted: #b6d9c6;
    }

    svg.muichiro {
      --bg1: #06141f;
      --bg2: #103d44;
      --main: #8fffe0;
      --accent: #9cc7ff;
      --soft: #d8fff7;
      --muted: #b7d8dc;
    }

    svg.denji {
      --bg1: #180b05;
      --bg2: #431808;
      --main: #ff8a1c;
      --accent: #ffcc3d;
      --soft: #ffe0a3;
      --muted: #d9b28c;
    }

    svg.maki {
      --bg1: #07110b;
      --bg2: #142f21;
      --main: #5cff95;
      --accent: #d8e4d3;
      --soft: #c7ffd8;
      --muted: #aac5ad;
    }

    svg.ulquiorra {
      --bg1: #020404;
      --bg2: #101713;
      --main: #58ffb0;
      --accent: #f5f5f5;
      --soft: #d6fff0;
      --muted: #a3b4ad;
    }

    .float { animation: float 4s ease-in-out infinite; }
    .pulse { animation: pulse 2.6s ease-in-out infinite; }
    .dash { stroke-dasharray: 12 14; animation: dash 18s linear infinite; }
    .blink { animation: blink 4s infinite; }
    .mist { animation: mist 8s ease-in-out infinite alternate; }
    .saw { animation: saw 1.4s ease-in-out infinite alternate; transform-origin: center; }
    .typing { animation: typing 3.5s steps(28) infinite alternate; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: .35; transform: scale(1); }
      50% { opacity: .95; transform: scale(1.04); }
    }

    @keyframes dash {
      to { stroke-dashoffset: -420; }
    }

    @keyframes blink {
      0%, 92%, 100% { opacity: 1; }
      95% { opacity: .1; }
    }

    @keyframes mist {
      from { transform: translateX(-18px); opacity: .22; }
      to { transform: translateX(22px); opacity: .48; }
    }

    @keyframes saw {
      from { transform: rotate(-4deg); }
      to { transform: rotate(4deg); }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 340px; }
    }

    .codeLine {
      overflow: hidden;
      white-space: nowrap;
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--bg1)" />
      <stop offset="1" stop-color="var(--bg2)" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="var(--main)" stop-opacity="0.65" />
      <stop offset="1" stop-color="var(--main)" stop-opacity="0" />
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <rect width="900" height="280" rx="28" fill="url(#bg)" />
  <rect x="12" y="12" width="876" height="256" rx="22" stroke="var(--main)" stroke-opacity=".35" />

  <g filter="url(#blur)" class="pulse">
    <circle cx="690" cy="128" r="90" fill="url(#glow)" />
    <circle cx="165" cy="225" r="70" fill="url(#glow)" />
  </g>

  <!-- Background energy lines -->
  <path class="dash" d="M30 224 C180 120 280 300 430 170 S700 60 870 122" stroke="var(--main)" stroke-width="2" stroke-opacity=".35" />
  <path class="dash" d="M20 72 C170 30 280 170 420 84 S660 16 878 52" stroke="var(--accent)" stroke-width="2" stroke-opacity=".28" />

  <!-- Character silhouette/card -->
  <g class="float">
    <circle cx="690" cy="126" r="72" fill="var(--main)" fill-opacity=".12" stroke="var(--main)" stroke-opacity=".55" />
    <circle cx="690" cy="100" r="28" fill="var(--soft)" fill-opacity=".92" />
    <path d="M646 202 C650 158 669 137 690 137 C711 137 730 158 734 202 Z" fill="var(--soft)" fill-opacity=".88" />

    <!-- hair/identity shape -->
    <path d="M660 96 C665 66 706 61 724 88 C711 83 706 110 690 106 C675 102 672 87 660 96Z" fill="var(--accent)" fill-opacity=".92" />
    <path d="M669 92 C682 77 706 76 719 91" stroke="var(--bg1)" stroke-width="5" stroke-linecap="round" opacity=".45" />

    <!-- eyes -->
    <circle class="blink" cx="680" cy="101" r="3" fill="var(--bg1)" />
    <circle class="blink" cx="701" cy="101" r="3" fill="var(--bg1)" />

    <!-- energy mark -->
    <path d="M690 47 L701 73 L729 75 L707 93 L714 121 L690 106 L666 121 L673 93 L651 75 L679 73 Z" fill="var(--main)" fill-opacity=".16" stroke="var(--main)" stroke-opacity=".55" />
  </g>

  <!-- Denji-like saw / action icon. Works as abstract energy symbol for all presets -->
  <g class="saw" opacity=".9">
    <path d="M765 190 L833 146" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" />
    <path d="M778 181 L784 198 L793 171 L802 188 L811 160 L820 177" stroke="var(--soft)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Mist / spiritual aura -->
  <g class="mist">
    <path d="M580 72 C626 52 678 65 726 46 C770 29 812 43 850 32" stroke="var(--soft)" stroke-width="9" stroke-linecap="round" opacity=".22" />
    <path d="M560 222 C630 194 695 232 762 205 C808 187 841 196 874 184" stroke="var(--soft)" stroke-width="10" stroke-linecap="round" opacity=".18" />
  </g>

  <!-- Text content -->
  <g transform="translate(58 60)">
    <text x="0" y="0" fill="var(--muted)" font-size="16" letter-spacing="4">GITHUB PROFILE</text>
    <text x="0" y="48" fill="var(--text)" font-size="42" font-weight="800">Athyrson Lopes</text>
    <text x="0" y="82" fill="var(--soft)" font-size="20" font-weight="500">Backend • Ruby • Elixir • Sistemas Distribuídos</text>

    <g transform="translate(0 118)">
      <rect x="0" y="0" width="390" height="46" rx="13" fill="#000" opacity=".22" />
      <text x="18" y="29" fill="var(--main)" font-family="Consolas, monospace" font-size="17">
        &gt; building clean APIs<span class="blink">_</span>
      </text>
    </g>

    <g transform="translate(0 184)">
      <circle cx="8" cy="8" r="5" fill="var(--main)" />
      <text x="24" y="14" fill="var(--muted)" font-size="15">Escolha a classe no SVG: kakyoin, muichiro, denji, maki ou ulquiorra</text>
    </g>
  </g>

  <!-- Small decorative symbols -->
  <g opacity=".55">
    <circle cx="75" cy="35" r="3" fill="var(--main)" />
    <circle cx="114" cy="34" r="2" fill="var(--accent)" />
    <circle cx="842" cy="244" r="3" fill="var(--main)" />
    <path d="M812 36 L824 56 L800 56 Z" stroke="var(--accent)" />
    <path d="M510 232 L525 232 M517.5 224 L517.5 240" stroke="var(--main)" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
